[workspace]
members = [
    "prebindgen",
    "prebindgen-proc-macro",
    "prebindgen-project-root",
    "prebindgen-opaque-types",
    "examples/example-cbindgen",
    "examples/example-flat",
    "examples/perftest-flat",
    "examples/perftest-c",
    "examples/perftest-kotlin",
    "examples/covertest-kotlin",
]
resolver = "2"
package.version = "0.5.0"
package.edition = "2021"
package.rust-version = "1.85"
package.license = "MIT OR Apache-2.0"
package.authors = ["Michael Ilyin <milyin@gmail.com>"]
package.repository = "https://github.com/milyin/prebindgen"
package.documentation = "https://docs.rs/prebindgen"
package.readme = "README.md"
package.keywords = ["ffi", "bindings", "cbindgen", "csbindgen", "cross-platform"]
package.categories = ["development-tools", "external-ffi-bindings"] 

[workspace.dependencies]
prebindgen = { path = "prebindgen", version = "0.5.0" }
prebindgen-proc-macro = { path = "prebindgen-proc-macro", version = "0.5.0" }
prebindgen-project-root = { path = "prebindgen-project-root", version = "0.5.0" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
syn = { version = "2.0", features = ["full", "visit-mut", "extra-traits"] }
quote = "1.0"
proc-macro2 = "1.0"
regex = "1.0"
prettyplease = "0.2"
roxygen = "1.0.4"
tempfile = "3.0"
itertools = "0.14.0"
if_rust_version = "1.0"
konst = "0.3.0" # consumer crates need konst too: the generated file emits a konst::assertc_eq! guard
toml = "0.9.5"
rand = "0.9.2"

[patch]

[patch.crates-io]

[patch.crates-io.prebindgen-project-root]
path = "prebindgen-project-root"
