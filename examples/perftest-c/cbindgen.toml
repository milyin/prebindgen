language = "C"
header = "/* Generated by cbindgen for perftest bindings */"
include_guard = "PERFTEST_H"
autogen_warning = "/* Warning, this file is autogenerated by cbindgen. Don't modify this manually. */"
include_version = true

[export]
# `malloc` / `free` are internal `extern "C"` bindings to the C runtime (the Rust
# side allocates returned arrays/strings with `malloc`, and `perftest_free` calls
# `free`). They're already in <stdlib.h>, so don't re-declare them in the header —
# only the library's own `perftest_free` freer is part of the public API.
exclude = ["malloc", "free"]

[parse]
# Parse all available items
parse_deps = true
include = []
exclude = []
expand = ["perftest_c"]

[fn]
# Configure function generation
args = "auto"

[struct]
# Configure struct generation
derive_eq = false
derive_neq = false
