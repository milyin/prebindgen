language = "C"
header = "/* Generated by cbindgen for perftest bindings */"
include_guard = "PERFTEST_H"
autogen_warning = "/* Warning, this file is autogenerated by cbindgen. Don't modify this manually. */"
include_version = true

[parse]
# Parse all available items
parse_deps = true
include = []
exclude = []
expand = ["perftest_c"]

[fn]
# Configure function generation
args = "auto"

[struct]
# Configure struct generation
derive_eq = false
derive_neq = false
